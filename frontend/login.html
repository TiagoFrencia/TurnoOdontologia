<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceder — Od. Rossetti</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal:       #3dbfb8;
      --teal-dark:  #2a9e97;
      --teal-dim:   #1d7a74;
      --teal-light: #e8f8f7;
      --dark:       #0f1f1e;
      --mid:        #1e3a38;
      --border-dim: rgba(61,191,184,0.18);
      --text-dim:   rgba(255,255,255,0.45);
      --text-soft:  rgba(255,255,255,0.72);
      --white:      #ffffff;
    }

    html, body {
      height: 100%;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--dark);
      color: var(--white);
    }

    @media (max-height: 680px) {
      .card { padding: 2rem 2rem 1.8rem; }
      .brand { margin-bottom: 1.5rem; }
      .brand-icon { width: 2.6rem; height: 2.6rem; margin-bottom: 0.8rem; }
    }

    /* ── Canvas / fondo ── */
    .scene {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Grain texture */
    .scene::before {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.045;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px;
    }

    /* Ambient glows */
    .glow-top {
      position: absolute;
      top: -15vh; left: 50%;
      transform: translateX(-50%);
      width: 70vw; height: 60vw;
      max-width: 700px; max-height: 600px;
      background: radial-gradient(ellipse, rgba(61,191,184,0.13) 0%, transparent 65%);
      pointer-events: none;
      animation: breathe 8s ease-in-out infinite alternate;
    }
    .glow-bottom {
      position: absolute;
      bottom: -20vh; right: -10vw;
      width: 50vw; height: 50vw;
      max-width: 500px; max-height: 500px;
      background: radial-gradient(circle, rgba(61,191,184,0.07) 0%, transparent 60%);
      pointer-events: none;
      animation: breathe 11s ease-in-out infinite alternate-reverse;
    }
    @keyframes breathe {
      from { opacity: 0.7; transform: translateX(-50%) scale(0.95); }
      to   { opacity: 1;   transform: translateX(-50%) scale(1.05); }
    }
    .glow-bottom { animation-name: breathe2; }
    @keyframes breathe2 {
      from { opacity: 0.6; transform: scale(0.9); }
      to   { opacity: 1;   transform: scale(1.1); }
    }

    /* Grid lines (subtle architectural background) */
    .grid-lines {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(61,191,184,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(61,191,184,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 100%);
    }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      margin: 1rem;
      background: rgba(30, 58, 56, 0.45);
      border: 1px solid var(--border-dim);
      border-radius: 28px;
      padding: 3rem 2.8rem 2.8rem;
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      box-shadow:
        0 0 0 1px rgba(61,191,184,0.06) inset,
        0 32px 80px rgba(0,0,0,0.55),
        0 8px 24px rgba(0,0,0,0.3);
      animation: slideUp 0.7s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px) scale(0.98); }
      to   { opacity: 1; transform: none; }
    }

    /* Teal top border accent */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 15%; right: 15%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--teal), transparent);
      opacity: 0.6;
      border-radius: 50%;
    }

    /* ── Logo / marca ── */
    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 2.5rem;
      animation: slideUp 0.7s 0.08s cubic-bezier(.16,1,.3,1) both;
    }
    .brand-icon {
      width: 3.2rem; height: 3.2rem;
      background: linear-gradient(135deg, var(--teal), var(--teal-dim));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 1.2rem;
      box-shadow: 0 0 0 8px rgba(61,191,184,0.1), 0 8px 28px rgba(61,191,184,0.3);
    }
    .brand-icon svg {
      width: 1.4rem; height: 1.4rem;
      stroke: white; fill: none; stroke-width: 1.8;
    }
    .brand-heading {
      font-family: 'Fraunces', serif;
      font-size: 1.65rem;
      font-weight: 300;
      letter-spacing: -0.025em;
      line-height: 1.1;
      color: var(--white);
    }
    .brand-heading em {
      font-style: italic;
      color: var(--teal);
    }
    .brand-sub {
      margin-top: 0.45rem;
      font-size: 0.75rem;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 500;
    }

    /* ── Form ── */
    .form {
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
      animation: slideUp 0.7s 0.14s cubic-bezier(.16,1,.3,1) both;
    }

    .field {
      position: relative;
    }
    .field label {
      display: block;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 0.5rem;
      transition: color 0.2s;
    }
    .field:focus-within label {
      color: var(--teal);
    }

    .field input {
      width: 100%;
      padding: 0.85rem 1rem;
      background: rgba(10,24,23,0.75);
      border: 1.5px solid rgba(61,191,184,0.35);
      border-radius: 12px;
      font-size: 0.92rem;
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: var(--white);
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      -webkit-text-fill-color: var(--white);
      caret-color: var(--teal);
    }
    .field input::placeholder {
      color: rgba(255,255,255,0.3);
    }
    .field input:-webkit-autofill,
    .field input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0 1000px #152928 inset;
      -webkit-text-fill-color: white;
    }
    .field input:focus {
      border-color: var(--teal);
      background: rgba(15,31,30,0.8);
      box-shadow: 0 0 0 4px rgba(61,191,184,0.12);
    }

    /* ── Error message ── */
    .error-msg {
      display: none;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      background: rgba(224, 92, 92, 0.12);
      border: 1px solid rgba(224, 92, 92, 0.3);
      border-radius: 10px;
      font-size: 0.8rem;
      color: #f4a4a4;
      animation: shake 0.35s cubic-bezier(.36,.07,.19,.97);
    }
    .error-msg.visible { display: flex; }
    @keyframes shake {
      10%, 90% { transform: translateX(-1px); }
      20%, 80% { transform: translateX(2px); }
      30%, 50%, 70% { transform: translateX(-3px); }
      40%, 60% { transform: translateX(3px); }
    }
    .error-msg svg { width: 1rem; height: 1rem; stroke: #f4a4a4; fill: none; stroke-width: 2; flex-shrink: 0; }

    /* ── Submit button ── */
    .btn-submit {
      width: 100%;
      padding: 0.95rem;
      margin-top: 0.4rem;
      background: linear-gradient(135deg, var(--teal), var(--teal-dark));
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 0.92rem;
      font-weight: 700;
      font-family: 'Plus Jakarta Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(61,191,184,0.35);
      position: relative;
      overflow: hidden;
      letter-spacing: 0.01em;
    }
    .btn-submit::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.08), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .btn-submit:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(61,191,184,0.45);
    }
    .btn-submit:hover:not(:disabled)::before { opacity: 1; }
    .btn-submit:active:not(:disabled) { transform: translateY(0); }
    .btn-submit:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    /* Loading state */
    .btn-submit .btn-text { transition: opacity 0.2s; }
    .btn-submit .btn-spinner {
      display: none;
      position: absolute;
      inset: 0;
      align-items: center;
      justify-content: center;
    }
    .btn-submit.loading .btn-text { opacity: 0; }
    .btn-submit.loading .btn-spinner { display: flex; }
    .spinner-ring {
      width: 1.2rem; height: 1.2rem;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ── */
    .card-footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.18);
      letter-spacing: 0.04em;
      animation: slideUp 0.7s 0.2s cubic-bezier(.16,1,.3,1) both;
    }
    .card-footer span {
      display: inline-block;
      width: 4px; height: 4px;
      background: var(--teal);
      border-radius: 50%;
      vertical-align: middle;
      margin: 0 0.4rem;
      opacity: 0.5;
    }
  </style>
</head>
<body>

<div class="scene">
  <div class="glow-top"></div>
  <div class="glow-bottom"></div>
  <div class="grid-lines"></div>

  <div class="card">

    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24">
          <path d="M12 3c-1.5 0-3 1-3 3 0 1 .4 2 .9 3l-.9 9c0 .8.6 1.5 1.5 1.5h3c.9 0 1.5-.7 1.5-1.5l-.9-9c.5-1 .9-2 .9-3 0-2-1.5-3-3-3z"/>
          <line x1="9" y1="8" x2="15" y2="8"/>
        </svg>
      </div>
      <h1 class="brand-heading" id="brand-heading">Bienvenido <em>al panel</em></h1>
      <p class="brand-sub" id="brand-sub">Sistema de turnos</p>
    </div>

    <form class="form" id="login-form" novalidate>

      <div class="field">
        <label for="inp-email">Correo electrónico</label>
        <input
          type="email"
          id="inp-email"
          placeholder="tu@email.com"
          autocomplete="username"
          required
        />
      </div>

      <div class="field">
        <label for="inp-password">Contraseña</label>
        <input
          type="password"
          id="inp-password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        />
      </div>

      <div class="error-msg" id="error-msg" role="alert">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="error-text">Credenciales inválidas. Verificá tu email y contraseña.</span>
      </div>

      <button type="submit" class="btn-submit" id="btn-submit">
        <span class="btn-text">Ingresar al panel</span>
        <span class="btn-spinner"><span class="spinner-ring"></span></span>
      </button>

    </form>

    <div class="card-footer" id="card-footer">
      Sistema de turnos online
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
  // ── Personalización por slug ──────────────────────────────────
  const BACKEND = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
    ? '' : 'https://worthy-tenderness-production-2989.up.railway.app';

  const slug = new URLSearchParams(location.search).get('slug');
  if (slug) {
    fetch(`${BACKEND}/api/c/${slug}/clinic-public`)
      .then(r => r.ok ? r.json() : null)
      .then(clinic => {
        if (!clinic) return;
        const cleanName = clinic.name.replace(/^(od\.|dr\.|dra\.|lic\.)\s*/i, '');
        const firstName = cleanName.split(' ')[0];
        document.getElementById('brand-heading').innerHTML =
          `Bienvenido, <em>${firstName}</em>`;
        document.getElementById('brand-sub').textContent =
          `Panel · ${clinic.name}`;
        document.getElementById('card-footer').textContent =
          clinic.name + (clinic.matricula ? ` · ${clinic.matricula}` : '');
      })
      .catch(() => {});
  }

  const SUPABASE_URL  = 'https://qerjqgybyjvcoxqnjybw.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFlcmpxZ3lieWp2Y294cW5qeWJ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNzk5MTIsImV4cCI6MjA5MTg1NTkxMn0.WLx45VB9hjda4Xq7usxGx_VvqTGDQdxvt6lN8Q23TMU';

  const { createClient } = window.supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

  // Si ya hay sesión activa, ir directo al dashboard
  sb.auth.getSession().then(({ data }) => {
    if (data.session) window.location.replace('/dashboard.html');
  });

  const form      = document.getElementById('login-form');
  const btnSubmit = document.getElementById('btn-submit');
  const errorMsg  = document.getElementById('error-msg');
  const errorText = document.getElementById('error-text');

  function setLoading(on) {
    btnSubmit.disabled = on;
    btnSubmit.classList.toggle('loading', on);
  }

  function showError(msg) {
    errorText.textContent = msg;
    errorMsg.classList.remove('visible');
    // Force reflow for re-animation
    void errorMsg.offsetWidth;
    errorMsg.classList.add('visible');
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorMsg.classList.remove('visible');

    const email    = document.getElementById('inp-email').value.trim();
    const password = document.getElementById('inp-password').value;

    if (!email || !password) {
      showError('Completá tu email y contraseña.');
      return;
    }

    setLoading(true);

    const { error } = await sb.auth.signInWithPassword({ email, password });

    if (error) {
      setLoading(false);
      if (error.status === 400 || error.status === 401) {
        showError('Email o contraseña incorrectos.');
      } else {
        showError('Error al conectar. Intentá de nuevo en un momento.');
      }
      return;
    }

    // Éxito — redirigir
    window.location.replace('/dashboard.html');
  });
</script>
</body>
</html>
